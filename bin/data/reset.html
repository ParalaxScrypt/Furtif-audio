<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title data-i18n="reset_title">Furtif Audio / Reset</title>
    <link id="main-style" rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <select id="langSelect">
    <option value="fr">Français</option>
    <option value="en">English</option>
    <option value="es">Español</option>
  </select>
    <div id="global">
      <div id="panel">
      <h1 data-i18n="reset_title"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"  fill="#00ff87" width="22px" height="22px"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M544.1 256L552 256C565.3 256 576 245.3 576 232L576 88C576 78.3 570.2 69.5 561.2 65.8C552.2 62.1 541.9 64.2 535 71L483.3 122.8C439 86.1 382 64 320 64C191 64 84.3 159.4 66.6 283.5C64.1 301 76.2 317.2 93.7 319.7C111.2 322.2 127.4 310 129.9 292.6C143.2 199.5 223.3 128 320 128C364.4 128 405.2 143 437.7 168.3L391 215C384.1 221.9 382.1 232.2 385.8 241.2C389.5 250.2 398.3 256 408 256L544.1 256zM573.5 356.5C576 339 563.8 322.8 546.4 320.3C529 317.8 512.7 330 510.2 347.4C496.9 440.4 416.8 511.9 320.1 511.9C275.7 511.9 234.9 496.9 202.4 471.6L249 425C255.9 418.1 257.9 407.8 254.2 398.8C250.5 389.8 241.7 384 232 384L88 384C74.7 384 64 394.7 64 408L64 552C64 561.7 69.8 570.5 78.8 574.2C87.8 577.9 98.1 575.8 105 569L156.8 517.2C201 553.9 258 576 320 576C449 576 555.7 480.6 573.4 356.5z"/></svg> WiFi reset completed</h1>
      <br><br><h2 id="status">Restart in progress<span id="loading">...</span></h2>
    </div>
    </div>
    <script>
      // Fonction pour faire l'animation des points
      let dots = 0;
      const loadingSpan = document.getElementById('loading');
      const interval = setInterval(() => {
        dots = (dots + 1) % 4; // 0,1,2,3
        loadingSpan.textContent = '.'.repeat(dots);
      }, 500);

      // Après 5 secondes
      setTimeout(() => {
        clearInterval(interval); // Arrêter l'animation
        const status = document.getElementById('status');
        status.innerHTML = 'Connect to the wireless access point (SSID) FURTIF-AUDIO-Setup and go to http://192.168.8.8'; // Changer le texte
      }, 8000);
    </script>
    <script>

    //reecriture du chemin pour le mode local
    const isLocal = ["localhost", "127.0.0.1"].includes(window.location.hostname);

      if (isLocal) {
        const link = document.getElementById("main-style");
        link.href = "style.css";
      }

    let translations = {};

    //reecriture du chemin pour le mode local
    function getLangPath() {
      const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';

      return isLocal ? 'lang.json' : '/lang.json';
    }
    // Charger le fichier JSON ou JS
    fetch(getLangPath())
      .then(response => response.json())
      .then(data => {
        translations = data;

        // Lire la langue sauvegardée ou mettre 'fr' par défaut
        const savedLang = localStorage.getItem('lang') || 'fr';

        // Appliquer les traductions dès le chargement
        applyTranslations(savedLang);

        // Mettre à jour le select pour refléter la langue
        document.getElementById('langSelect').value = savedLang;
      });

    // Fonction pour appliquer les traductions
    function applyTranslations(lang) {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[lang] && translations[lang][key]) {
          if (el.tagName === 'TITLE') {
            document.title = translations[lang][key];
          } else {
            el.innerText = translations[lang][key];
          }
        }
      });
    }

    // Gestion du changement de langue
    document.getElementById('langSelect').addEventListener('change', (e) => {
      const lang = e.target.value;
      localStorage.setItem('lang', lang);
      applyTranslations(lang);
    });
    </script>
  </body>
</html>
