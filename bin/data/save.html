<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title  data-i18n="save_title">WiFi enregistré</title>
    <link id="main-style" rel="stylesheet" href="/style.css" />
</head>
<body>
  <select id="langSelect">
  <option value="fr">Français</option>
  <option value="en">English</option>
  <option value="es">Español</option>
</select>
  <div id="global">
      <div id="panel">

  <h4 data-i18n="save_title">WiFi enregistré</h4>
  <p data-i18n="save_info-1">L'ESP32 va redémarrer et se connecter au réseau.</p>
  <p><b data-i18n="save_info-2">Ensuite :</b></p>
  <ul>
    <li data-i18n="save_info-3">cherchez l'IP de votre micro sur votre réseau WiFi</li><br>
    <li data-i18n="save_info-4">Ouvrez VLC pour écouter le flux : (Exemple : http://ip-Du-Micro/audio.wav)</li>
  </ul>
  <br>
  <p id="status" ><span data-i18n="save_info-5">Redémarrage en cours</span><span id="loading">...</span></p>

<script>
  // Fonction pour faire l'animation des points
  let dots = 0;
  const loadingSpan = document.getElementById('loading');
  const interval = setInterval(() => {
    dots = (dots + 1) % 4; // 0,1,2,3
    loadingSpan.textContent = '.'.repeat(dots);
  }, 500);

  // Après 5 secondes
  setTimeout(() => {
    clearInterval(interval); // Arrêter l'animation
    const status = document.getElementById('status');
    status.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" fill="#00ff87" width="30%" height="30%"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M320 576C178.6 576 64 461.4 64 320C64 178.6 178.6 64 320 64C461.4 64 576 178.6 576 320C576 461.4 461.4 576 320 576zM438 209.7C427.3 201.9 412.3 204.3 404.5 215L285.1 379.2L233 327.1C223.6 317.7 208.4 317.7 199.1 327.1C189.8 336.5 189.7 351.7 199.1 361L271.1 433C276.1 438 282.9 440.5 289.9 440C296.9 439.5 303.3 435.9 307.4 430.2L443.3 243.2C451.1 232.5 448.7 217.5 438 209.7z"/></svg>'; // Changer le texte
  }, 8000);
</script>
<script>

//reecriture du chemin pour le mode local
const isLocal = ["localhost", "127.0.0.1"].includes(window.location.hostname);

  if (isLocal) {
    const link = document.getElementById("main-style");
    link.href = "style.css";
  }

let translations = {};

//reecriture du chemin pour le mode local
function getLangPath() {
  const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';

  return isLocal ? 'lang.json' : '/lang.json';
}
// Charger le fichier JSON ou JS
fetch(getLangPath())
  .then(response => response.json())
  .then(data => {
    translations = data;

    // Lire la langue sauvegardée ou mettre 'fr' par défaut
    const savedLang = localStorage.getItem('lang') || 'fr';

    // Appliquer les traductions dès le chargement
    applyTranslations(savedLang);

    // Mettre à jour le select pour refléter la langue
    document.getElementById('langSelect').value = savedLang;
  });

// Fonction pour appliquer les traductions
function applyTranslations(lang) {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (translations[lang] && translations[lang][key]) {
      if (el.tagName === 'TITLE') {
        document.title = translations[lang][key];
      } else {
        el.innerText = translations[lang][key];
      }
    }
  });
}

// Gestion du changement de langue
document.getElementById('langSelect').addEventListener('change', (e) => {
  const lang = e.target.value;
  localStorage.setItem('lang', lang);
  applyTranslations(lang);
});
</script>
</div>
</div>
</body>
</html>
