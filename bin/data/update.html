<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Furtif Audio / Update</title>
  <link id="main-style" rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <select id="langSelect">
    <option value="fr">Français</option>
    <option value="en">English</option>
    <option value="es">Español</option>
  </select>
    <div id="global">
<div id="panel">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"  fill="#00ff87" width="38px" height="38px"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M176 544C96.5 544 32 479.5 32 400C32 336.6 73 282.8 129.9 263.5C128.6 255.8 128 248 128 240C128 160.5 192.5 96 272 96C327.4 96 375.5 127.3 399.6 173.1C413.8 164.8 430.4 160 448 160C501 160 544 203 544 256C544 271.7 540.2 286.6 533.5 299.7C577.5 320 608 364.4 608 416C608 486.7 550.7 544 480 544L176 544zM337 255C327.6 245.6 312.4 245.6 303.1 255L231.1 327C221.7 336.4 221.7 351.6 231.1 360.9C240.5 370.2 255.7 370.3 265 360.9L296 329.9L296 432C296 445.3 306.7 456 320 456C333.3 456 344 445.3 344 432L344 329.9L375 360.9C384.4 370.3 399.6 370.3 408.9 360.9C418.2 351.5 418.3 336.3 408.9 327L336.9 255z"/></svg>
      <h1 data-i18n="update_title">

        Update Firmware</h1>
      <h2 data-i18n="update_info">Attention! veuillez patienter apres avoir cliquer sur le bouton de mise à jour</h2> <button onclick="updateFirmware()" class="button-3" data-i18n="update_btn">Mettre à jour</button>
</div>
      <script>
        function updateFirmware() {
          fetch('/updateFirmware', { method: 'POST' })  // ✅ correction ici
            .then(response => response.text())
            .then(data => alert(data))
            .catch(err => alert("Erreur: " + err));
        }
      </script>
      <script>

      //reecriture du chemin pour le mode local
      const isLocal = ["localhost", "127.0.0.1"].includes(window.location.hostname);

        if (isLocal) {
          const link = document.getElementById("main-style");
          link.href = "style.css";
        }

      let translations = {};

      //reecriture du chemin pour le mode local
      function getLangPath() {
        const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';

        return isLocal ? 'lang.json' : '/lang.json';
      }
      // Charger le fichier JSON ou JS
      fetch(getLangPath())
        .then(response => response.json())
        .then(data => {
          translations = data;

          // Lire la langue sauvegardée ou mettre 'fr' par défaut
          const savedLang = localStorage.getItem('lang') || 'fr';

          // Appliquer les traductions dès le chargement
          applyTranslations(savedLang);

          // Mettre à jour le select pour refléter la langue
          document.getElementById('langSelect').value = savedLang;
        });

      // Fonction pour appliquer les traductions
      function applyTranslations(lang) {
        document.querySelectorAll('[data-i18n]').forEach(el => {
          const key = el.getAttribute('data-i18n');
          if (translations[lang] && translations[lang][key]) {
            if (el.tagName === 'TITLE') {
              document.title = translations[lang][key];
            } else {
              el.innerText = translations[lang][key];
            }
          }
        });
      }

      // Gestion du changement de langue
      document.getElementById('langSelect').addEventListener('change', (e) => {
        const lang = e.target.value;
        localStorage.setItem('lang', lang);
        applyTranslations(lang);
      });
      </script>


    </div>

  </body>
</html>
