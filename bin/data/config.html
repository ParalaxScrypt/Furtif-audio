<script>
const mdp = document.getElementById("mdp");
const toggle = document.getElementById("togglePwd");

toggle.addEventListener("click", () => {
  if (mdp.type === "password") {
    mdp.type = "text";

  } else {
    mdp.type = "password";

  }
});
</script>
<script>

//reecriture du chemin pour le mode local
const isLocal = ["localhost", "127.0.0.1"].includes(window.location.hostname);

  if (isLocal) {
    const link = document.getElementById("main-style");
    link.href = "style.css";
  }

let translations = {};

//reecriture du chemin pour le mode local
function getLangPath() {
  const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';

  return isLocal ? 'lang.json' : '/lang.json';
}
// Charger le fichier JSON ou JS
fetch(getLangPath())
  .then(response => response.json())
  .then(data => {
    translations = data;

    // Lire la langue sauvegardée ou mettre 'fr' par défaut
    const savedLang = localStorage.getItem('lang') || 'fr';

    // Appliquer les traductions dès le chargement
    applyTranslations(savedLang);

    // Mettre à jour le select pour refléter la langue
    document.getElementById('langSelect').value = savedLang;
  });

// Fonction pour appliquer les traductions
function applyTranslations(lang) {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (translations[lang] && translations[lang][key]) {
      if (el.tagName === 'TITLE') {
        document.title = translations[lang][key];
      } else {
        el.innerText = translations[lang][key];
      }
    }
  });
}

// Gestion du changement de langue
document.getElementById('langSelect').addEventListener('change', (e) => {
  const lang = e.target.value;
  localStorage.setItem('lang', lang);
  applyTranslations(lang);
});
</script>
